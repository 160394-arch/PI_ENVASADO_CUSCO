<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Indicadores de Agua · PI's Cambio de Turno</title>
<style>
  :root{
    --bg:#0b0f19;
    --panel:#0f1524;
    --panel2:#111830;
    --grid:#1c2438;
    --text:#e6e9f0;
    --muted:#7c8aa5;
    --blue:#2ea6ea;
    --blue-dim:#1d3a52;
    --green:#3ddc97;
    --orange:#f5a623;
    --red:#ef4757;
    --purple:#a78bfa;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'Segoe UI', Arial, sans-serif;
    color:var(--text);
    padding:26px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--grid);
    border-radius:14px;
    padding:22px 26px 18px;
    max-width:1040px;
    margin:0 auto;
  }
  .title{
    letter-spacing:2px;
    font-size:13px;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:4px;
  }
  .title span{color:#5fc2f7; font-weight:700;}
  .subtitle{ font-size:12px; color:var(--muted); margin-bottom:18px; }

  .row{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .row-label{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; width:100%; margin-bottom:6px; }

  .pill{
    background:#141b2e;
    border:1px solid var(--grid);
    color:var(--muted);
    padding:8px 15px;
    border-radius:20px;
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    transition:all .15s ease;
  }
  .pill:hover{ border-color:var(--blue); color:#5fc2f7; }
  .pill.active{ background:var(--blue); border-color:var(--blue); color:#fff; }
  .pill.active.view-atipicos{ background:var(--red); border-color:var(--red); }

  .dropdown{
    background:#141b2e;
    border:1px solid var(--grid);
    color:var(--text);
    padding:10px 16px;
    border-radius:10px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    width:100%;
    max-width:480px;
    appearance:none;
    -webkit-appearance:none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c8aa5' stroke-width='2'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
    background-repeat:no-repeat;
    background-position: right 14px center;
    background-size:16px;
    padding-right:40px;
  }
  .dropdown:hover{ border-color:var(--blue); }
  .dropdown:focus{ outline:none; border-color:var(--blue); }
  .dropdown option{ background:#141b2e; color:var(--text); }

  .kpi-row{ display:flex; gap:12px; margin:16px 0 18px; flex-wrap:wrap; }
  .kpi{ flex:1; min-width:130px; background:var(--panel2); border:1px solid var(--grid); border-radius:10px; padding:12px 16px; }
  .kpi .label{ font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .kpi .value{ font-size:22px; font-weight:700; margin-top:4px; }
  .kpi .value.ok{ color:var(--green); }
  .kpi .value.bad{ color:var(--red); }
  .kpi .sub{ font-size:11px; color:var(--muted); margin-top:2px; }

  #chartWrap{ width:100%; overflow-x:auto; }
  svg{ display:block; }

  .bar-label{ font-size:11px; font-weight:700; fill:var(--text); text-anchor:middle; }
  .axis-label{ font-size:10.5px; fill:var(--muted); text-anchor:middle; font-weight:600; }
  .grid-line{ stroke:var(--grid); stroke-width:1; }

  .legend-note{ display:flex; gap:20px; justify-content:center; flex-wrap:wrap; font-size:11.5px; color:var(--muted); padding:14px 0 6px; }
  .legend-note .dot{ display:inline-block; width:9px;height:9px; border-radius:2px; margin-right:6px; vertical-align:middle; }
  .legend-note .line-swatch{ display:inline-block; width:16px;height:0; border-top:2.5px dashed var(--orange); margin-right:6px; vertical-align:middle; }

  table{ width:100%; border-collapse:collapse; margin-top:14px; font-size:12.5px; }
  th,td{ padding:8px 10px; text-align:left; border-bottom:1px solid var(--grid); }
  th{ color:var(--muted); text-transform:uppercase; font-size:10.5px; letter-spacing:.5px; }
  td.num{ text-align:right; font-variant-numeric:tabular-nums; }
  tr.outlier td{ color:var(--red); font-weight:700; }
  .empty-msg{ color:var(--muted); font-size:13px; text-align:center; padding:30px 0; }
</style>
</head>
<body>

<div class="card">
  <div class="title">INDICADORES DE AGUA · <span id="indicatorName">-</span></div>

  <div class="row">
    <div class="row-label">Indicador</div>
    <select id="indicatorSelector" class="dropdown"></select>
  </div>

  <div class="row">
    <div class="row-label">Vista</div>
    <div id="viewSelector"></div>
  </div>

  <div class="row" id="monthRow" style="display:none;">
    <div class="row-label">Mes</div>
    <div id="monthSelector"></div>
  </div>

  <div class="kpi-row" id="kpiRow"></div>

  <div id="chartWrap"></div>

  <div class="legend-note" id="legendNote"></div>

  <div id="extraContent"></div>
</div>

function isBusinessDay(iso){
  const d = new Date(iso + "T00:00:00");
  const dow = d.getDay(); // 0 = domingo
  return dow !== 0;
}

function countBusinessDays(startIso, endIso){
  let count = 0;
  let d = new Date(startIso + "T00:00:00");
  const end = new Date(endIso + "T00:00:00");
  while(d <= end){
    const iso = d.toISOString().slice(0,10);
    if(isBusinessDay(iso)) count++;
    d.setDate(d.getDate()+1);
  }
  return count;
}

function monthLastDay(year, month){ // month 1-12
  return new Date(year, month, 0).getDate();
}

function isoWeekInfo(iso){
  // devuelve lunes de la semana correspondiente (semana Lun-Dom)
  const d = new Date(iso + "T00:00:00");
  const dow = d.getDay();
  const diffToMonday = (dow === 0) ? -6 : (1 - dow);
  const monday = new Date(d);
  monday.setDate(d.getDate() + diffToMonday);
  return monday.toISOString().slice(0,10);
}

// ---------------- geometria ----------------
const W = 960, H = 380;
const padL = 60, padR = 30, padT = 30, padB = 60;
const plotW = W - padL - padR;
const plotH = H - padT - padB;

function svgGridAndAxis(maxVal, labels, values, metas, dimIndex, ratios){
  const hasRatio = Array.isArray(ratios) && ratios.some(r => r !== null && r !== undefined);
  const n = labels.length;
  const minBand = hasRatio ? 46 : 34;
  const dynPlotW = Math.max(plotW, n * minBand);
  const padRight = hasRatio ? padR + 46 : padR;
  const svgW = padL + padRight + dynPlotW;
  const bandW = dynPlotW / n;
  const barW = hasRatio ? Math.min(bandW * 0.4, 34) : Math.min(bandW * 0.55, 46);
  const yScale = v => padT + plotH - (v / maxVal) * plotH;
  const xCenter = i => padL + bandW * i + bandW/2;

  const ratioMax = hasRatio ? Math.max(...ratios.filter(r=>r!==null && r!==undefined)) * 1.25 : 0;
  const ratioYScale = v => padT + plotH - (v / ratioMax) * plotH;

  let gridSvg = '';
  const steps = 5;
  for(let s=0;s<=steps;s++){
    const val = (maxVal/steps)*s;
    const y = yScale(val);
    gridSvg += `<line class="grid-line" x1="${padL}" y1="${y}" x2="${svgW-padRight}" y2="${y}"/>`;
    gridSvg += `<text x="${padL-10}" y="${y+4}" text-anchor="end" font-size="10.5" fill="#7c8aa5">${val.toFixed(1)}</text>`;
    if(hasRatio){
      const ratioVal = (ratioMax/steps)*s;
      gridSvg += `<text x="${svgW-padRight+10}" y="${y+4}" text-anchor="start" font-size="10" fill="#facc15">${ratioVal.toFixed(3)}</text>`;
    }
  }
  if(hasRatio){
    gridSvg += `<text x="${svgW-padRight+10}" y="${padT-12}" text-anchor="start" font-size="10" fill="#facc15" font-weight="700">Indic./HL</text>`;
  }

  let barsSvg = '';
  labels.forEach((lab,i)=>{
    const val = values[i];
    const meta = metas[i];
    const x = xCenter(i) - (hasRatio ? bandW*0.42 : barW/2);
    const y = yScale(val);
    const h = padT + plotH - y;
    const dim = dimIndex !== null && dimIndex !== i;
    const cumplida = val <= meta;
    let color = cumplida ? '#3ddc97' : '#ef4757';
    if(dim) color = cumplida ? '#1f5c42' : '#5c222b';
    barsSvg += `<rect x="${x}" y="${y}" width="${barW}" height="${Math.max(h,0)}" rx="4" fill="${color}"/>`;
    if(barW > 22 && !hasRatio){
      barsSvg += `<text class="bar-label" x="${x+barW/2}" y="${y-8}" opacity="${dim?0.35:1}">${val.toFixed(1)}</text>`;
    }
    if(hasRatio && ratios[i] !== null && ratios[i] !== undefined){
      const ratioBarW = Math.max(barW*0.32, 5);
      const rx = x + barW + 3;
      const ry = ratioYScale(ratios[i]);
      const rh = padT + plotH - ry;
      const rcolor = dim ? '#7a6118' : '#facc15';
      barsSvg += `<rect x="${rx}" y="${ry}" width="${ratioBarW}" height="${Math.max(rh,0)}" rx="1.5" fill="${rcolor}"><title>${lab}: ${ratios[i].toFixed(4)} (Indicador/HL)</title></rect>`;
      barsSvg += `<text x="${rx+ratioBarW/2}" y="${Math.max(ry-6,12)}" font-size="9.5" fill="#facc15" text-anchor="middle" font-weight="700" transform="rotate(-60 ${rx+ratioBarW/2} ${Math.max(ry-6,12)})">${ratios[i].toFixed(3)}</text>`;
    }
    const rot = n > 12 ? `transform="rotate(-40 ${xCenter(i)} ${H-padB+18})" text-anchor="end"` : '';
    barsSvg += `<text class="axis-label" x="${xCenter(i)}" y="${H-padB+20}" ${rot}>${lab}</text>`;
  });

  let points = labels.map((lab,i)=>`${xCenter(i)},${yScale(metas[i])}`).join(' ');
  let lineSvg = `<polyline points="${points}" fill="none" stroke="#f5a623" stroke-width="2.5" stroke-dasharray="7,5"/>`;
  labels.forEach((lab,i)=>{
    lineSvg += `<circle cx="${xCenter(i)}" cy="${yScale(metas[i])}" r="3.5" fill="#f5a623"/>`;
  });

  return `<svg viewBox="0 0 ${svgW} ${H}" width="${svgW}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;">
    ${gridSvg}${barsSvg}${lineSvg}
  </svg>`;
}

// ---------------- agregaciones ----------------
function hlFor(dateIso){
  const v = HL_DATA[dateIso];
  return (v === undefined || v === null) ? null : v;
}

function dailySeries(indicatorKey){
  const info = WATER_DATA[indicatorKey];
  const dates = Object.keys(info.data).sort();
  return dates.map(dt => {
    const vals = info.data[dt].filter(v => v !== null && v !== undefined);
    let value;
    if(info.type === 'avg'){
      value = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    } else {
      value = vals.reduce((a,b)=>a+b,0);
    }
    const meta = (info.type === 'avg') ? info.meta_turno : info.meta_turno * 3;
    const hl = hlFor(dt);
    const ratio = (hl && hl > 0) ? value / hl : null;
    return { date: dt, value, meta, turnos: info.data[dt], hl, ratio };
  });
}

function weeklySeries(indicatorKey){
  const daily = dailySeries(indicatorKey);
  const info = WATER_DATA[indicatorKey];
  const weeks = {};
  daily.forEach(d => {
    const wk = isoWeekInfo(d.date);
    if(!weeks[wk]) weeks[wk] = { start: wk, values: [], dates: [], hlSum: 0, hasHl: false };
    weeks[wk].values.push(d.value);
    weeks[wk].dates.push(d.date);
    if(d.hl !== null){ weeks[wk].hlSum += d.hl; weeks[wk].hasHl = true; }
  });
  const weekKeys = Object.keys(weeks).sort();
  return weekKeys.map(wk => {
    const w = weeks[wk];
    const monday = new Date(wk + "T00:00:00");
    const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
    const sundayIso = sunday.toISOString().slice(0,10);
    let value, meta;
    if(info.type === 'avg'){
      value = w.values.reduce((a,b)=>a+b,0)/w.values.length;
      meta = info.meta_turno;
    } else {
      value = w.values.reduce((a,b)=>a+b,0);
      const bDays = countBusinessDays(wk, sundayIso);
      meta = info.meta_turno * 3 * bDays;
    }
    const ratio = (w.hasHl && w.hlSum > 0) ? value / w.hlSum : null;
    const label = `${monday.getDate()}/${monday.getMonth()+1}`;
    return { label, start: wk, value, meta, ndays: w.dates.length, ratio, hl: w.hlSum };
  });
}

function monthlySeries(indicatorKey){
  const daily = dailySeries(indicatorKey);
  const info = WATER_DATA[indicatorKey];
  const months = {};
  daily.forEach(d => {
    const ym = d.date.slice(0,7);
    if(!months[ym]) months[ym] = { values: [], hlSum: 0, hasHl: false };
    months[ym].values.push(d.value);
    if(d.hl !== null){ months[ym].hlSum += d.hl; months[ym].hasHl = true; }
  });
  const monthKeys = Object.keys(months).sort();
  return monthKeys.map(ym => {
    const [y,m] = ym.split('-').map(Number);
    const lastDay = monthLastDay(y,m);
    const startIso = `${ym}-01`;
    const endIso = `${ym}-${String(lastDay).padStart(2,'0')}`;
    let value, meta;
    const mo = months[ym];
    if(info.type === 'avg'){
      value = mo.values.reduce((a,b)=>a+b,0)/mo.values.length;
      meta = info.meta_turno;
    } else {
      value = mo.values.reduce((a,b)=>a+b,0);
      const bDays = countBusinessDays(startIso, endIso);
      meta = info.meta_turno * 3 * bDays;
    }
    const ratio = (mo.hasHl && mo.hlSum > 0) ? value / mo.hlSum : null;
    return { label: MESES[m-1], ym, value, meta, ratio, hl: mo.hlSum };
  });
}

function availableMonths(indicatorKey){
  const daily = dailySeries(indicatorKey);
  const set = new Set(daily.map(d => d.date.slice(0,7)));
  return Array.from(set).sort();
}

// ---------------- outliers (IQR) ----------------
function outlierAnalysis(indicatorKey){
  const info = WATER_DATA[indicatorKey];
  const records = [];
  Object.keys(info.data).sort().forEach(dt => {
    info.data[dt].forEach((v, idx) => {
      if(v !== null && v !== undefined){
        records.push({ date: dt, turno: ['I','II','III'][idx], value: v });
      }
    });
  });
  const sorted = records.map(r=>r.value).slice().sort((a,b)=>a-b);
  const q = p => {
    const idx = (sorted.length-1)*p;
    const lo = Math.floor(idx), hi = Math.ceil(idx);
    return sorted[lo] + (sorted[hi]-sorted[lo])*(idx-lo);
  };
  const q1 = q(0.25), q3 = q(0.75);
  const iqr = q3 - q1;
  const lowerBound = q1 - 1.5*iqr;
  const upperBound = q3 + 1.5*iqr;
  records.forEach(r => { r.isOutlier = (r.value < lowerBound || r.value > upperBound); });
  return { records, q1, q3, iqr, lowerBound: Math.max(lowerBound,0), upperBound };
}

// ---------------- render ----------------
function render(){
  indicatorSelector.value = currentIndicator;
  document.querySelectorAll('#viewSelector .pill').forEach(b => b.classList.toggle('active', b.dataset.view === currentView));

  document.getElementById('indicatorName').textContent = WATER_DATA[currentIndicator].name;
  document.getElementById('monthRow').style.display = (currentView === 'dia') ? 'flex' : 'none';

  if(currentView === 'dia'){
    renderMonthSelector();
    renderDia();
  } else if(currentView === 'semana'){
    renderSemana();
  } else if(currentView === 'mes'){
    renderMes();
  } else if(currentView === 'atipicos'){
    renderAtipicos();
  }
}

function renderMonthSelector(){
  const months = availableMonths(currentIndicator);
  // filtrar seleccion actual a meses que existen; si no hay ninguno, usar el mas reciente
  currentMonths = currentMonths.filter(m => months.includes(m));
  if(currentMonths.length === 0) currentMonths = [months[months.length-1]];

  const wrap = document.getElementById('monthSelector');
  wrap.innerHTML = '';
  months.forEach(ym => {
    const [y,m] = ym.split('-').map(Number);
    const btn = document.createElement('button');
    btn.className = 'pill' + (currentMonths.includes(ym) ? ' active' : '');
    btn.textContent = MESES[m-1] + ' ' + y;
    btn.addEventListener('click', () => {
      if(currentMonths.includes(ym)){
        if(currentMonths.length > 1) currentMonths = currentMonths.filter(x => x !== ym);
      } else {
        currentMonths.push(ym);
      }
      render();
    });
    wrap.appendChild(btn);
  });

  const allBtn = document.createElement('button');
  allBtn.className = 'pill';
  allBtn.style.borderColor = 'var(--purple)';
  allBtn.style.color = '#c4b5fd';
  allBtn.textContent = (currentMonths.length === months.length) ? 'Ninguno' : 'Todos';
  allBtn.addEventListener('click', () => {
    currentMonths = (currentMonths.length === months.length) ? [months[months.length-1]] : months.slice();
    render();
  });
  wrap.appendChild(allBtn);
}

function renderDia(){
  const monthSet = new Set(currentMonths);
  const daily = dailySeries(currentIndicator).filter(d => monthSet.has(d.date.slice(0,7)));
  const info = WATER_DATA[currentIndicator];
  if(daily.length === 0){
    document.getElementById('chartWrap').innerHTML = '<div class="empty-msg">Sin datos para los meses seleccionados.</div>';
    document.getElementById('kpiRow').innerHTML = '';
    document.getElementById('extraContent').innerHTML = '';
    setLegend('dia');
    return;
  }
  const multi = currentMonths.length > 1;
  const labels = daily.map(d => multi ? `${d.date.slice(8,10)}/${d.date.slice(5,7)}` : d.date.slice(8,10));
  const values = daily.map(d => d.value);
  const metas = daily.map(d => d.meta);
  const ratios = daily.map(d => d.ratio);
  const maxVal = Math.max(...values, ...metas) * 1.2;
  document.getElementById('chartWrap').innerHTML = svgGridAndAxis(maxVal, labels, values, metas, null, ratios);
  setLegend('dia');
  renderKpis(values, metas, info, 'día');
  document.getElementById('extraContent').innerHTML = '';
}

function renderSemana(){
  const weekly = weeklySeries(currentIndicator);
  const info = WATER_DATA[currentIndicator];
  const labels = weekly.map(w => w.label);
  const values = weekly.map(w => w.value);
  const metas = weekly.map(w => w.meta);
  const ratios = weekly.map(w => w.ratio);
  const maxVal = Math.max(...values, ...metas) * 1.2 || 1;
  document.getElementById('chartWrap').innerHTML = svgGridAndAxis(maxVal, labels, values, metas, null, ratios);
  setLegend('semana');
  renderKpis(values, metas, info, 'semana');
  document.getElementById('extraContent').innerHTML = '';
}

function renderMes(){
  const monthly = monthlySeries(currentIndicator);
  const info = WATER_DATA[currentIndicator];
  const labels = monthly.map(m => m.label);
  const values = monthly.map(m => m.value);
  const metas = monthly.map(m => m.meta);
  const ratios = monthly.map(m => m.ratio);
  const maxVal = Math.max(...values, ...metas) * 1.2 || 1;
  document.getElementById('chartWrap').innerHTML = svgGridAndAxis(maxVal, labels, values, metas, null, ratios);
  setLegend('mes');
  renderKpis(values, metas, info, 'mes');
  document.getElementById('extraContent').innerHTML = '';
}

function renderKpis(values, metas, info, periodo){
  const totalVal = values.reduce((a,b)=>a+b,0);
  const totalMeta = metas.reduce((a,b)=>a+b,0);
  const cumplidos = values.filter((v,i)=>v<=metas[i]).length;
  const pctCumpl = ((cumplidos/values.length)*100).toFixed(0);
  const kpiRow = document.getElementById('kpiRow');
  const promedio = totalVal/values.length;
  kpiRow.innerHTML = `
    <div class="kpi">
      <div class="label">Promedio / ${periodo}</div>
      <div class="value">${promedio.toFixed(2)}</div>
      <div class="sub">Disparador base: ${info.meta_turno}</div>
    </div>
    <div class="kpi">
      <div class="label">% periodos que cumplen</div>
      <div class="value ${pctCumpl>=70?'ok':'bad'}">${pctCumpl}%</div>
      <div class="sub">${cumplidos} de ${values.length}</div>
    </div>
    <div class="kpi">
      <div class="label">Máximo registrado</div>
      <div class="value">${Math.max(...values).toFixed(2)}</div>
    </div>
    <div class="kpi">
      <div class="label">Mínimo registrado</div>
      <div class="value">${Math.min(...values).toFixed(2)}</div>
    </div>`;
}

function setLegend(view){
  document.getElementById('legendNote').innerHTML = `
    <span><span class="dot" style="background:var(--green)"></span>Cumple meta</span>
    <span><span class="dot" style="background:var(--red)"></span>No cumple meta</span>
    <span><span class="line-swatch"></span>Meta (constante, solo excluye domingos)</span>
    <span><span class="dot" style="background:#facc15"></span>Barra delgada: Indicador / TOTAL HL envasados (valor visible arriba, eje derecho)</span>`;
}

function renderAtipicos(){
  const { records, q1, q3, iqr, lowerBound, upperBound } = outlierAnalysis(currentIndicator);
  const info = WATER_DATA[currentIndicator];
  const outliers = records.filter(r => r.isOutlier);

  // scatter chart
  const n = records.length;
  const minSlot = 6;
  const dynPlotW = Math.max(plotW, n * minSlot);
  const svgW = padL + padR + dynPlotW;
  const maxVal = Math.max(...records.map(r=>r.value), upperBound) * 1.15;
  const bandW = dynPlotW / n;
  const yScale = v => padT + plotH - (v/maxVal)*plotH;

  let gridSvg = '';
  const steps = 5;
  for(let s=0;s<=steps;s++){
    const val = (maxVal/steps)*s;
    const y = yScale(val);
    gridSvg += `<line class="grid-line" x1="${padL}" y1="${y}" x2="${svgW-padR}" y2="${y}"/>`;
    gridSvg += `<text x="${padL-10}" y="${y+4}" text-anchor="end" font-size="10.5" fill="#7c8aa5">${val.toFixed(1)}</text>`;
  }
  const yUpper = yScale(upperBound);
  const yLower = yScale(Math.max(lowerBound,0));
  gridSvg += `<line x1="${padL}" y1="${yUpper}" x2="${svgW-padR}" y2="${yUpper}" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,4"/>`;
  gridSvg += `<text x="${svgW-padR}" y="${yUpper-6}" text-anchor="end" font-size="10.5" fill="#a78bfa">límite superior (${upperBound.toFixed(1)})</text>`;
  if(lowerBound > 0){
    gridSvg += `<line x1="${padL}" y1="${yLower}" x2="${svgW-padR}" y2="${yLower}" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,4"/>`;
    gridSvg += `<text x="${svgW-padR}" y="${yLower+14}" text-anchor="end" font-size="10.5" fill="#a78bfa">límite inferior (${lowerBound.toFixed(1)})</text>`;
  }

  let dotsSvg = '';
  records.forEach((r,i) => {
    const x = padL + bandW*i + bandW/2;
    const y = yScale(r.value);
    const color = r.isOutlier ? '#ef4757' : '#2ea6ea';
    const rad = r.isOutlier ? 4.5 : 2.8;
    dotsSvg += `<circle cx="${x}" cy="${y}" r="${rad}" fill="${color}" opacity="${r.isOutlier?1:0.55}"/>`;
  });

  document.getElementById('chartWrap').innerHTML = `<svg viewBox="0 0 ${svgW} ${H}" width="${svgW}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;">${gridSvg}${dotsSvg}</svg>`;

  document.getElementById('legendNote').innerHTML = `
    <span><span class="dot" style="background:var(--blue)"></span>Registro normal (${records.length - outliers.length})</span>
    <span><span class="dot" style="background:var(--red)"></span>Valor atípico (${outliers.length})</span>
    <span><span class="line-swatch" style="border-top-color:#a78bfa"></span>Límites IQR (Q1-1.5·IQR / Q3+1.5·IQR)</span>`;

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi">
      <div class="label">Registros analizados</div>
      <div class="value">${records.length}</div>
    </div>
    <div class="kpi">
      <div class="label">Valores atípicos</div>
      <div class="value ${outliers.length>0?'bad':'ok'}">${outliers.length}</div>
      <div class="sub">${((outliers.length/records.length)*100).toFixed(1)}% del total</div>
    </div>
    <div class="kpi">
      <div class="label">Rango normal (IQR)</div>
      <div class="value" style="font-size:16px;">${Math.max(lowerBound,0).toFixed(1)} - ${upperBound.toFixed(1)}</div>
    </div>
    <div class="kpi">
      <div class="label">Q1 / Q3</div>
      <div class="value" style="font-size:16px;">${q1.toFixed(1)} / ${q3.toFixed(1)}</div>
    </div>`;

  let tableHtml = '';
  if(outliers.length){
    tableHtml = `<table>
      <thead><tr><th>Fecha</th><th>Turno</th><th class="num">Valor</th><th class="num">Disparador</th></tr></thead>
      <tbody>
        ${outliers.sort((a,b)=> a.date < b.date ? 1 : -1).map(o => `
          <tr class="outlier">
            <td>${o.date}</td>
            <td>${o.turno}</td>
            <td class="num">${o.value}</td>
            <td class="num">${info.meta_turno}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  } else {
    tableHtml = '<div class="empty-msg">No se detectaron valores atípicos para este indicador.</div>';
  }
  document.getElementById('extraContent').innerHTML = tableHtml;
}

render();
</script>
